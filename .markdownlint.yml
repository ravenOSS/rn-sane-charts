# -----------------------------------------------------------------------------
# rn-sane-charts — Markdown lint rules (canonical)
#
# Targets GitHub Flavored Markdown (GFM), as used for README, docs, and
# GitHub-rendered content:
#   https://docs.github.com/en/get-started/writing-on-github/getting-started-with-writing-and-formatting-on-github/basic-writing-and-formatting-syntax
#
# Use the markdownlint VS Code/Cursor extension or markdownlint-cli(2) with
# this file at the repository root.
# -----------------------------------------------------------------------------

default: true

# MD013 — Line length. GFM does not cap line length; tables and URLs are often long.
MD013: false

# MD029 — Ordered list prefix style. Use `1.` / `2.` / … (GitHub renders correctly).
MD029:
  style: ordered

# MD032 — Lists should be surrounded by blank lines. Required for consistent
# parsing and matches common GFM style (avoids merged block/list ambiguity).
# Fix: add one blank line before the first list item and after the last when
# adjacent to paragraphs or headings.
MD032: true

# MD033 — Inline HTML. GFM allows raw HTML (e.g. <details>, <br />); do not
# disable per-file unless a local exception is needed.
MD033: false

# MD041 — First line in file must be a top-level heading. Disabled so README
# and small snippets may start with a title line or badge row without forcing H1.
MD041: false

# MD046 — Code block style. Prefer fenced (```) blocks in new docs (GFM default);
# not enforced here so existing indented examples stay valid.
